<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Gold gradient: lighter at top (illumination), deeper at base (grounded) -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CA78"/>
      <stop offset="50%" stop-color="#C8A252"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <!-- Subtle glow for the noon dot -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow for depth on background -->
    <filter id="inner-depth">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#1a3050" flood-opacity="0.4"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: deep navy with slight rounded square -->
  <rect width="128" height="128" rx="22" fill="#0A1626" filter="url(#inner-depth)"/>

  <!-- Subtle geometric border — echoing the ◈ motifs from the site -->
  <rect x="5" y="5" width="118" height="118" rx="18" fill="none"
        stroke="rgba(200,162,82,0.10)" stroke-width="0.75"/>

  <!-- ═══ THE N/ن CHIMERA ═══ -->

  <!-- LEFT PILLAR — classical tradition
       Rises from base, curves inward at top into the noon bowl -->
  <path d="M 28 110 L 28 50 Q 28 30 46 25"
        fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>

  <!-- RIGHT PILLAR — contemporary thought
       Mirrors the left, curves inward to meet the noon bowl -->
  <path d="M 100 110 L 100 50 Q 100 30 82 25"
        fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>

  <!-- THE نون BOWL — the bridge between traditions
       A graceful Arabic calligraphic arc connecting the pillar tops -->
  <path d="M 46 25 Q 64 16 82 25"
        fill="none" stroke="url(#gold)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- THE PATH (النهج) — the diagonal of N
       Rendered as a gentle curve, not a rigid line — because the path
       of knowledge is never perfectly straight -->
  <path d="M 30 48 C 50 68, 76 92, 98 110"
        fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>

  <!-- THE نون DOT — rendered as a diamond ◇
       Echoes the geometric symbols (✦ ◈ ◇) used across the site
       Represents the guiding point of knowledge above the path -->
  <g filter="url(#glow)">
    <rect x="58.5" y="3.5" width="11" height="11" rx="1.5"
          transform="rotate(45 64 9)" fill="#E8CA78"/>
  </g>
</svg>
